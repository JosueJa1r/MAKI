<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAKI Boutique | Acceso Administrativo</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Link to the main style.css for shared design tokens -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            background-color: var(--color-pink-ultra-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-card {
            background-color: var(--color-white);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 211, 224, 0.4);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-logo {
            height: 70px;
            width: auto;
            border-radius: 50%;
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
        }
        
        .login-title {
            font-family: var(--font-heading);
            font-size: 2rem;
            color: var(--color-text-dark);
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            font-size: 0.9rem;
            color: var(--color-text-muted);
            margin-bottom: 30px;
        }
        
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-text-dark);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--color-text-muted);
            pointer-events: none;
            transition: var(--transition-fast);
        }
        
        .login-input {
            width: 100%;
            height: 52px;
            padding: 10px 16px 10px 46px;
            border: 1px solid var(--color-pink-soft);
            border-radius: var(--border-radius-md);
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--color-text-dark);
            background-color: var(--color-white);
            transition: var(--transition-fast);
        }
        
        .login-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(255, 85, 153, 0.15);
        }
        
        .login-input:focus + i {
            color: var(--color-primary);
        }
        
        .btn-login {
            width: 100%;
            height: 52px;
            margin-top: 10px;
        }
        
        .back-to-site {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--color-text-muted);
            text-decoration: none;
            transition: var(--transition-fast);
        }
        
        .back-to-site:hover {
            color: var(--color-primary);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="assets/logo.png" alt="Maki Boutique Logo" class="login-logo">
        <h1 class="login-title">Acceso Privado</h1>
        <p class="login-subtitle">Ingresa tus credenciales para administrar el catálogo</p>
        
        <form id="login-form">
            <!-- Username Input -->
            <div class="form-group">
                <label for="username">Usuario</label>
                <div class="input-wrapper">
                    <input type="text" id="username" class="login-input" placeholder="Ingresa tu usuario" required autocomplete="username">
                    <i data-lucide="user" style="width: 18px; height: 18px;"></i>
                </div>
            </div>
            
            <!-- Password Input -->
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="login-input" placeholder="Ingresa tu contraseña" required autocomplete="current-password">
                    <i data-lucide="lock" style="width: 18px; height: 18px;"></i>
                </div>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary btn-login" id="btn-submit">
                <span>Ingresar al Panel</span>
            </button>
        </form>
        
        <a href="../shop/index.html" class="back-to-site">
            <i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i>
            <span>Volver a la Tienda</span>
        </a>
    </div>

    <!-- Toast Notification -->
    <div class="toast-notification" id="toast-notification">
        <div class="toast-content">
            <i data-lucide="info" class="toast-icon"></i>
            <span class="toast-message" id="toast-message">Mensaje de prueba</span>
        </div>
    </div>

    <script>
        // Determinar dinámicamente la URL de la API basándose en el host
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5000/api/login'
            : 'https://maki-api.vercel.app/api/login';

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            
            // Si ya hay un token guardado, redirigir directo al admin
            if (sessionStorage.getItem('maki_admin_token')) {
                window.location.href = 'index.html';
            }
        });

        const form = document.getElementById('login-form');
        const toast = document.getElementById('toast-notification');
        const toastMessage = document.getElementById('toast-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btnSubmit = document.getElementById('btn-submit');
            
            btnSubmit.disabled = true;
            btnSubmit.querySelector('span').textContent = 'Validando credenciales...';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    showToastAlert("✓ ¡Bienvenida de nuevo! Redirigiendo...");
                    
                    // Guardar token en sessionStorage (se borra al cerrar el navegador)
                    sessionStorage.setItem('maki_admin_token', result.token);
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1200);
                } else {
                    showToastAlert("❌ " + (result.error || "Usuario o contraseña incorrectos."));
                    btnSubmit.disabled = false;
                    btnSubmit.querySelector('span').textContent = 'Ingresar al Panel';
                }
            } catch (err) {
                console.error(err);
                showToastAlert("❌ Error de red. Asegúrate de tener el backend encendido.");
                btnSubmit.disabled = false;
                btnSubmit.querySelector('span').textContent = 'Ingresar al Panel';
            }
        });

        function showToastAlert(message) {
            toastMessage.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);
        }
    </script>
</body>
</html>
